<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>三送会：一定速度 + 余韻6秒</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header>
    <div class="title">
      <div class="h1">三送会：一定速度（最後6秒余韻）</div>
      <div class="sub">スライドは曲が終わる6秒前に流れ終わって停止。最後の6秒は動かない。</div>
    </div>
    <div class="pill" id="statusPill">READY</div>
  </header>

  <main class="wrap">
    <section class="card">
      <div class="hd">1) 画像（順番つき）</div>
      <div class="bd">
        <input id="imgInput" type="file" accept="image/*" multiple />
        <div class="hint">サムネをドラッグで並び替え。縁取りなし。</div>
        <div class="list" id="imgList"></div>
      </div>

      <div class="hd">2) 音源</div>
      <div class="bd">
        <input id="audInput" type="file" accept="audio/*" />
        <div class="grid2">
          <div class="field">
            <label>曲の長さ</label>
            <div class="read" id="audLen">-</div>
          </div>
          <div class="field">
            <label>余韻</label>
            <div class="read">6.0 秒固定</div>
          </div>
          <div class="field">
            <label>画像の見せ方</label>
            <select id="fitMode">
              <option value="contain" selected>contain（切れない）</option>
              <option value="cover">cover（迫力）</option>
            </select>
          </div>
          <div class="field">
            <label>球体（右下）</label>
            <select id="orbOn">
              <option value="on" selected>ON</option>
              <option value="off">OFF</option>
            </select>
          </div>
        </div>
      </div>

      <div class="hd">3) 再生 / 生成</div>
      <div class="bd">
        <div class="row">
          <button class="btn" id="btnPreview">プレビュー</button>
          <button class="btn primary" id="btnGenerate">生成（WebM）</button>
          <button class="btn danger" id="btnAbort">停止/中止</button>
          <button class="btn" id="btnFS">フルスクリーン</button>
        </div>

        <div class="row" style="margin-top:10px">
          <a class="btn" id="dlLink" href="#" download="sanso.webm" style="display:none;">ダウンロード</a>
        </div>

        <div class="hint" style="margin-top:10px">
          生成は曲の長さぶん待つ（録画方式）。終端は自動で止まってDLが出る。
        </div>
      </div>

      <div class="hd">ログ</div>
      <div class="bd">
        <div class="log" id="log"></div>
      </div>
    </section>

    <section class="card">
      <div class="hd">プレビュー（1920×1080固定）</div>
      <div class="bd">
        <div class="stage" id="stage">
          <canvas id="cv"></canvas>
        </div>

        <div class="hud">
          <div class="badge" id="badge">0.0s</div>
          <div class="bar"><div id="bar"></div></div>
          <div class="badge" id="stateBadge">IDLE</div>
        </div>

        <audio id="audio" controls style="width:100%; margin-top:10px;"></audio>
      </div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
